<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barcode Attendance Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body{
font-family: Arial;
text-align:center;
margin-top:20px;
}

#scanner{
width:100%;
max-width:400px;
margin:auto;
}

#status{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<h2>Barcode Attendance Scanner</h2>

<div id="scanner"></div>

<p id="status">Waiting for scan...</p>

<script>

const ESP32_IP = "192.168.1.14";

Quagga.init({
inputStream: {
name: "Live",
type: "LiveStream",
target: document.querySelector('#scanner'),
constraints: {
facingMode: "environment"
}
},
decoder: {
readers: [
"code_128_reader",
"ean_reader",
"code_39_reader"
]
}
}, function(err) {
if (err) {
console.log(err);
return;
}
Quagga.start();
});

Quagga.onDetected(function(result) {

let code = result.codeResult.code;

document.getElementById("status").innerHTML =
"Scanned: " + code;

fetch("http://" + ESP32_IP + "/scan?data=" + code)
.then(res => res.text())
.then(data => {

document.getElementById("status").innerHTML = data;

});

});

</script>

</body>

</html>
